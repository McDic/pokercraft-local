# NOTE: Currently all web tests are pure TypeScript (parsers, utils, visualization).
# If WASM-dependent test code is added, this workflow must also trigger on Rust
# changes (crates/**, Cargo.toml, Cargo.lock) and include a wasm-pack build step.
name: Web Testing

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
    paths:
      - "web/**"
      - ".github/workflows/test-web.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "web/**"
      - ".github/workflows/test-web.yml"
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      # Typechecking used to run only in the deploy workflow, on master. That is
      # too late: the i18n keys are checked by the type system, so a bad key in a
      # PR would have gone green here and only broken the deploy.
      - name: Typecheck
        working-directory: web
        run: npx tsc -b

      - name: Run tests
        working-directory: web
        run: npm test
